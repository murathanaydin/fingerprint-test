<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonts Fingerprint</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f6f7fb; color: #111; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; background: #4338ca; color: white; cursor: pointer; font-size: 14px; }
    #result { margin-top: 16px; padding: 12px; background: white; border: 1px solid #dbe2ea; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
    .section { margin-top: 12px; }
    .label { font-weight: 700; margin-bottom: 6px; }
    pre { margin: 0; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
    #canvas { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
  <h1>Fonts Fingerprint</h1>
  <button id="btn">Yenile</button>
  <div id="result">Henüz oluşturulmadı.</div>
  <canvas id="canvas" width="1200" height="400"></canvas>

  <script>
    function hashString(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function measureFont(fontFamily, text, fontSize) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontSize}px ${fontFamily}`;
      const width = ctx.measureText(text).width;
      const metrics = ctx.measureText(text);
      return {
        fontFamily,
        fontSize,
        text,
        width: Number(width.toFixed(4)),
        actualBoundingBoxAscent: metrics.actualBoundingBoxAscent || null,
        actualBoundingBoxDescent: metrics.actualBoundingBoxDescent || null
      };
    }

    function getFontsFingerprint() {
      const testText = 'mmmmmmmmmmlliWWWW1234;.;';
      const fonts = [
        'Arial',
        'Courier New',
        'Georgia',
        'Times New Roman',
        'Trebuchet MS',
        'Verdana',
        'Tahoma',
        'Segoe UI',
        'Noto Sans',
        'Comic Sans MS',
        'monospace',
        'serif',
        'sans-serif'
      ];

      const data = {
        devicePixelRatio: window.devicePixelRatio,
        measurements: fonts.map((font) => measureFont(font, testText, 32))
      };

      const raw = JSON.stringify(data, null, 2);
      return { raw, hash: hashString(raw) };
    }

    function renderFontsFingerprint() {
      const fingerprint = getFontsFingerprint();
      document.getElementById('result').innerHTML = `
        <div class="section">
          <div class="label">Hashli veri</div>
          <pre>${fingerprint.hash}</pre>
        </div>
        <div class="section">
          <div class="label">Ham veri</div>
          <pre>${fingerprint.raw}</pre>
        </div>
      `;
    }

    document.getElementById('btn').addEventListener('click', renderFontsFingerprint);
    renderFontsFingerprint();
  </script>
</body>
</html>
