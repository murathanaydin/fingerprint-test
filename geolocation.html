<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geolocation Fingerprint</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f6f7fb; color: #111; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; background: #ca8a04; color: white; cursor: pointer; font-size: 14px; }
    #result { margin-top: 16px; padding: 12px; background: white; border: 1px solid #dbe2ea; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
    .section { margin-top: 12px; }
    .label { font-weight: 700; margin-bottom: 6px; }
    pre { margin: 0; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Geolocation Fingerprint</h1>
  <button id="btn">Konum İzni İste / Yenile</button>
  <div id="result">Henüz oluşturulmadı.</div>

  <script>
    function hashString(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function getPermissionState() {
      if (!navigator.permissions || !navigator.permissions.query) {
        return Promise.resolve({ supported: false, state: null });
      }
      return navigator.permissions.query({ name: 'geolocation' })
        .then((status) => ({ supported: true, state: status.state }))
        .catch((error) => ({ supported: false, state: null, error: String(error) }));
    }

    function getCurrentPosition() {
      if (!navigator.geolocation) {
        return Promise.resolve({ supported: false, position: null, error: 'Geolocation desteklenmiyor' });
      }
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => resolve({
            supported: true,
            position: {
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              accuracy: position.coords.accuracy,
              altitude: position.coords.altitude,
              altitudeAccuracy: position.coords.altitudeAccuracy,
              heading: position.coords.heading,
              speed: position.coords.speed,
              timestamp: position.timestamp
            },
            error: null
          }),
          (error) => resolve({ supported: true, position: null, error: `${error.code}: ${error.message}` }),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    async function getGeolocationFingerprint() {
      const permission = await getPermissionState();
      const location = await getCurrentPosition();
      const data = {
        permission,
        location
      };
      const raw = JSON.stringify(data, null, 2);
      return { raw, hash: hashString(raw) };
    }

    async function renderGeolocationFingerprint() {
      const fingerprint = await getGeolocationFingerprint();
      document.getElementById('result').innerHTML = `
        <div class="section">
          <div class="label">Hashli veri</div>
          <pre>${fingerprint.hash}</pre>
        </div>
        <div class="section">
          <div class="label">Ham veri</div>
          <pre>${fingerprint.raw}</pre>
        </div>
      `;
    }

    document.getElementById('btn').addEventListener('click', renderGeolocationFingerprint);
    renderGeolocationFingerprint();
  </script>
</body>
</html>
