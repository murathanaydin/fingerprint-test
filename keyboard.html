<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard & Input Fingerprint</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f6f7fb; color: #111; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; background: #0f766e; color: white; cursor: pointer; font-size: 14px; }
    #result { margin-top: 16px; padding: 12px; background: white; border: 1px solid #dbe2ea; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
    .section { margin-top: 12px; }
    .label { font-weight: 700; margin-bottom: 6px; }
    pre { margin: 0; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Keyboard & Input Fingerprint</h1>
  <button id="btn">Yenile</button>
  <div id="result">Henüz oluşturulmadı.</div>

  <script>
    function hashString(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    async function getKeyboardLayoutMap() {
      if (!navigator.keyboard || !navigator.keyboard.getLayoutMap) {
        return { supported: false, keys: [] };
      }

      try {
        const layoutMap = await navigator.keyboard.getLayoutMap();
        const interestingKeys = ['KeyQ', 'KeyW', 'KeyE', 'KeyA', 'KeyZ', 'Digit1', 'Digit2', 'Minus', 'Equal', 'Space'];
        return {
          supported: true,
          keys: interestingKeys.map((code) => ({ code, key: layoutMap.get(code) || null }))
        };
      } catch (error) {
        return { supported: false, error: String(error), keys: [] };
      }
    }

    function getInputMethodData() {
      return {
        inputMethodContext: typeof window.InputMethodContext !== 'undefined',
        virtualKeyboard: typeof navigator.virtualKeyboard !== 'undefined',
        onbeforeinput: 'onbeforeinput' in document,
        oncompositionstart: 'oncompositionstart' in window,
        oncompositionupdate: 'oncompositionupdate' in window,
        oncompositionend: 'oncompositionend' in window,
        inputEvent: typeof window.InputEvent !== 'undefined'
      };
    }

    async function getKeyboardFingerprint() {
      const data = {
        layoutMap: await getKeyboardLayoutMap(),
        inputMethod: getInputMethodData(),
        language: navigator.language,
        languages: navigator.languages,
        platform: navigator.platform
      };
      const raw = JSON.stringify(data, null, 2);
      return { raw, hash: hashString(raw) };
    }

    async function renderKeyboardFingerprint() {
      const fingerprint = await getKeyboardFingerprint();
      document.getElementById('result').innerHTML = `
        <div class="section">
          <div class="label">Hashli veri</div>
          <pre>${fingerprint.hash}</pre>
        </div>
        <div class="section">
          <div class="label">Ham veri</div>
          <pre>${fingerprint.raw}</pre>
        </div>
      `;
    }

    document.getElementById('btn').addEventListener('click', renderKeyboardFingerprint);
    renderKeyboardFingerprint();
  </script>
</body>
</html>
