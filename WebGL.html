<!doctype html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WebGL Fingerprint</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 24px;
			background: #f4f7fb;
			color: #111;
		}

		button {
			padding: 10px 16px;
			border: 0;
			border-radius: 8px;
			background: #0f766e;
			color: white;
			cursor: pointer;
			font-size: 14px;
		}

		#result {
			margin-top: 16px;
			padding: 12px;
			background: white;
			border: 1px solid #d6dde6;
			border-radius: 8px;
			word-break: break-all;
			white-space: pre-wrap;
		}

		.section {
			margin-top: 12px;
		}

		.label {
			font-weight: 700;
			margin-bottom: 6px;
		}

		pre {
			margin: 0;
			padding: 10px;
			background: #f8fafc;
			border: 1px solid #e2e8f0;
			border-radius: 6px;
			white-space: pre-wrap;
			word-break: break-all;
		}

		canvas {
			display: none;
		}
	</style>
</head>
<body>
	<h1>WebGL Fingerprint</h1>
	<button id="btn">Fingerprint Oluştur</button>
	<div id="result">Henüz oluşturulmadı.</div>
	<canvas id="glCanvas" width="1" height="1"></canvas>

	<script>
		function hashString(text) {
			let hash = 0;
			for (let i = 0; i < text.length; i++) {
				hash = ((hash << 5) - hash) + text.charCodeAt(i);
				hash |= 0;
			}
			return String(hash);
		}

		function getWebGLFingerprint() {
			const canvas = document.getElementById('glCanvas');
			const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

			if (!gl) {
				return 'WebGL desteklenmiyor';
			}

			const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
			const vendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
			const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
			const version = gl.getParameter(gl.VERSION);
			const shadingLanguage = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
			const maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
			const maxCubeMapTextureSize = gl.getParameter(gl.MAX_CUBE_MAP_TEXTURE_SIZE);

			const raw = [
				`vendor: ${vendor}`,
				`renderer: ${renderer}`,
				`version: ${version}`,
				`shadingLanguage: ${shadingLanguage}`,
				`maxTextureSize: ${maxTextureSize}`,
				`maxCubeMapTextureSize: ${maxCubeMapTextureSize}`
			].join('\n');
			const hash = hashString(raw);
			return { raw, hash };
		}

		function renderWebGLFingerprint() {
			const fingerprint = getWebGLFingerprint();
			document.getElementById('result').innerHTML = `
				<div class="section">
					<div class="label">Hashli veri</div>
					<pre>${fingerprint.hash}</pre>
				</div>
				<div class="section">
					<div class="label">Ham veri</div>
					<pre>${fingerprint.raw}</pre>
				</div>
			`;
		}

		document.getElementById('btn').addEventListener('click', () => {
			renderWebGLFingerprint();
		});

		renderWebGLFingerprint();
	</script>
</body>
</html>
